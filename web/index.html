<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support Assistant · Multi-Agent</title>
  <meta name="description" content="Transparent multi-agent AI support assistant" />
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c5cff'/%3E%3Cstop offset='1' stop-color='%234f8cff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ccircle cx='16' cy='16' r='6' fill='white' opacity='.95'/%3E%3C/svg%3E"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="app" data-view="chat">
    <!-- ───────────────────────────── Sidebar ───────────────────────────── -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l2.2 4.6L19 9.8l-3.5 3.4.8 4.8L12 15.7 7.7 18l.8-4.8L5 9.8l4.8-2.2z" />
          </svg>
        </span>
        <span class="brand__text">
          <strong>Support&nbsp;Assistant</strong>
          <small>Multi-agent · transparent</small>
        </span>
      </div>

      <nav class="nav" aria-label="Primary">
        <button class="nav__item is-active" data-nav="chat" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-11.9 7.6L3 21l1.9-6.1A8.4 8.4 0 1 1 21 11.5z"/></svg>
          <span>Chat</span>
        </button>
        <button class="nav__item" data-nav="operator" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          <span>Operator</span>
        </button>
      </nav>

      <button id="new-chat" class="new-chat" type="button">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>

      <div class="convos">
        <div class="convos__label">Recent conversations</div>
        <div id="conversation-list" class="convos__list" aria-label="Saved conversations"></div>
      </div>

      <div class="panel">
        <h3 class="panel__title">Settings</h3>
        <label class="field">
          <span class="field__label">Customer ID</span>
          <input id="customer-id" class="field__input" type="number" min="1" inputmode="numeric" placeholder="none" />
        </label>
        <div class="field">
          <span class="field__label">Runtime</span>
          <div id="runtime-switcher" class="seg" role="tablist" aria-label="Runtime"></div>
          <p id="runtime-hint" class="hint"></p>
        </div>
      </div>

      <div class="status">
        <span class="status__item" id="status-db" title="Database">
          <span class="dot" data-state="unknown"></span> DB
        </span>
        <span class="status__item" id="status-model" title="Active model">
          <span class="dot" data-state="unknown"></span> <span class="status__model">model…</span>
        </span>
      </div>
    </aside>

    <!-- ────────────────────────────── Main ─────────────────────────────── -->
    <main class="main">
      <!-- Chat view -->
      <section class="view view--chat" aria-label="Chat">
        <div class="chat">
          <div id="transcript" class="transcript" role="log" aria-live="polite" aria-label="Conversation"></div>
          <form id="composer-form" class="composer" autocomplete="off">
            <textarea
              id="composer-input"
              class="composer__input"
              rows="1"
              placeholder="Ask about films, your subscription, rentals, account help…"
              aria-label="Message"
            ></textarea>
            <button id="composer-send" class="composer__send" type="submit" aria-label="Send">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>
            </button>
          </form>
          <p class="composer__hint">Enter to send · Shift+Enter for a new line</p>
        </div>

        <aside class="trace" aria-label="Pipeline trace">
          <header class="trace__head">
            <h2 class="trace__title">Pipeline trace</h2>
            <span id="trace-runtime" class="tag">core</span>
          </header>
          <div id="trace-body" class="trace__body"></div>
        </aside>
      </section>

      <!-- Operator view -->
      <section class="view view--operator" aria-label="Operator">
        <header class="operator__head">
          <div class="optabs" role="tablist" aria-label="Operator sections">
            <button class="optab is-active" data-optab="routes" type="button" role="tab">Routes</button>
            <button class="optab" data-optab="agents" type="button" role="tab">Agents</button>
            <button class="optab" data-optab="kb" type="button" role="tab">Knowledge base</button>
            <button class="optab" data-optab="handoffs" type="button" role="tab">Handoffs</button>
          </div>
          <button id="operator-refresh" class="btn btn--ghost" type="button">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
            Refresh
          </button>
        </header>
        <div id="operator-body" class="operator__body"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
