# Self-hosted Langfuse — the observability backend for this project.
#
# Kept SEPARATE from the project's docker-compose.yml (which is just the lean Pagila
# Postgres the app needs) so the day-to-day `docker compose up` is unchanged and this
# heavier, optional stack is opt-in:
#
#   docker compose -f docker-compose.langfuse.yml --env-file .env.langfuse up -d
#
# Then open http://localhost:3000, create a project, copy the public/secret keys into
# the app's .env (LANGFUSE_ENABLED=true, LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY,
# LANGFUSE_HOST=http://localhost:3000), and `uv sync --extra observability`.
#
# Langfuse v3 is a 6-container system: web + worker (the app), its OWN Postgres
# (transactional), ClickHouse (traces/observations), Redis (queue), and MinIO (S3 blob
# store events land in before the worker ingests them). It uses its own Postgres — it does
# NOT touch the Pagila database. All infra runs in UTC.
#
# The three secrets (NEXTAUTH_SECRET, SALT, ENCRYPTION_KEY) come from .env.langfuse — see
# .env.langfuse.example. Generate each with: openssl rand -hex 32

services:
  langfuse-web:
    image: langfuse/langfuse:3
    restart: always
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment: &langfuse-env
      DATABASE_URL: postgresql://postgres:postgres@langfuse-postgres:5432/postgres
      SALT: ${SALT:?set SALT in .env.langfuse}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY (64 hex chars) in .env.langfuse}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env.langfuse}
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_PROJECT_ID: ""
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${REDIS_AUTH:-langfuseredis}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: always
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Internal only — the worker ingests from the queue; nothing connects to it directly.
    environment: *langfuse-env

  langfuse-postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      TZ: UTC
    # Not published to the host by default (avoids colliding with Pagila's 5432). Uncomment
    # to inspect it directly; it maps to 5433 so it never clashes with the app's database.
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server
    restart: always
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      TZ: UTC
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server

  minio:
    image: minio/minio
    restart: always
    entrypoint: sh
    # Create the bucket Langfuse expects, then start the server.
    command: -c 'mkdir -p /data/langfuse && minio server /data --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
      TZ: UTC
    ports:
      - "9091:9001" # MinIO console (debugging only); API stays internal on :9000
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - langfuse_minio_data:/data

  redis:
    image: redis:7
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_AUTH:-langfuseredis}"]
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_AUTH:-langfuseredis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - langfuse_redis_data:/data

volumes:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
  langfuse_redis_data:
